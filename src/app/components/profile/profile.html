<div class="container my-4" style="max-width: 600px;">
  <div class="card shadow-sm border-0 p-4 bg-white position-relative overflow-hidden">
    <div class="bg-success position-absolute top-0 start-0 w-100" style="height: 6px;"></div>

    <div class="text-center mb-4">
      <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center p-3 mb-2" style="width: 5rem; height: 5rem;">
        <span class="fs-1">👤</span>
      </div>
      <h3 class="fw-bold m-0">Mi Perfil PawFeeder</h3>
      <p class="text-muted small">Configuración general de tu cuenta y vinculación IoT</p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="guardarPerfil()">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre</label>
          <input type="text" formControlName="nombre" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Apellido</label>
          <input type="text" formControlName="apellido" class="form-control">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Correo electrónico</label>
        <input type="email" formControlName="email" class="form-control" readonly style="background-color: #f8f9fa;">
        <small class="text-muted">El correo electrónico no se puede cambiar.</small>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Teléfono de contacto</label>
        <input type="text" formControlName="telefono" class="form-control">
      </div>

      <div class="mb-4 p-3 bg-light rounded border border-2">
        <label class="form-label fw-bold text-dark m-0 mb-1">ID de Dispensador Vinculado (Arduino)</label>
        <input type="text" formControlName="arduinoId" class="form-control border-success fw-mono bg-white text-success">
        <small class="text-muted">Este token permite la comunicación WiFi mediante los tópicos MQTT.</small>
      </div>

      <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold py-2">
        Guardar Cambios
      </button>
    </form>
  </div>
</div>
