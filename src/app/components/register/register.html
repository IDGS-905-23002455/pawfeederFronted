<div class="pf-auth-wrap" style="min-height:calc(100vh - 4rem);">
    <div class="pf-auth-image d-none d-md-block"
         style="background-image:url('/images/auth-bg.jpg'); background-size:cover; background-position:center;">
        <div style="width:100%;height:100%;background:linear-gradient(to bottom,rgba(0,0,0,0.15),rgba(22,163,74,0.5));
                    display:flex;align-items:flex-end;padding:2.5rem;">
            <div class="text-white">
                <img src="imagenes/pawfeeder-mark.png" alt="PawFeeder" style="height:3rem;margin-bottom:1rem;filter:brightness(0) invert(1);" />
                <h2 class="fw-black mb-1"><span style="color:#bbf7d0;">Paw</span>Feeder</h2>
                <p class="opacity-75 mb-0">Tu mascota merece la mejor alimentación.</p>
            </div>
        </div>
    </div>
    <div class="pf-auth-form">
        <div class="pf-form-box">
            <div class="text-center mb-4 d-md-none">
                <img src="imagenes/pawfeeder-mark.png" alt="PawFeeder" style="height:3.5rem;" class="mb-2" />
                <div class="pf-logo-text fs-3"><span class="paw">Paw</span><span class="feeder">Feeder</span></div>
            </div>

            <h2 class="fw-bold mb-1">Crea tu cuenta</h2>
            <p class="text-muted mb-4">Es gratis. Sin tarjeta de crédito.</p>

<form [formGroup]="registerForm" (ngSubmit)="onRegister()">
  <div class="row g-3">
    <div class="col-md-6 mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" formControlName="nombre" class="form-control" placeholder="Juan">
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Apellido</label>
      <input type="text" formControlName="apellido" class="form-control" placeholder="Pérez">
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Correo electrónico</label>
    <input type="email" formControlName="email" class="form-control" placeholder="tu@correo.com">
  </div>

  <div class="mb-3">
    <label class="form-label">Contraseña</label>
    <input type="password" formControlName="password" class="form-control" placeholder="Mínimo 8 caracteres">
  </div>

  <div class="mb-3">
    <label class="form-label">Confirmar contraseña</label>
    <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Repite tu contraseña">
  </div>

  <div class="form-check mb-3">
    <input type="checkbox" formControlName="aceptaTerminos" class="form-check-input" id="terminos">
    <label class="form-check-label" for="terminos">Acepto los términos de uso</label>
  </div>

  <button type="submit" class="btn btn-success w-100 rounded-pill">Crear cuenta</button>
</form>

            <p class="text-center text-muted small mt-4">
                ¿Ya tienes cuenta?
                <a asp-controller="Account" asp-action="Login" class="text-decoration-none fw-semibold" style="color:var(--pf-primary);">Iniciar sesión</a>
            </p>
        </div>
    </div>
</div>
