
<div class="pf-auth-wrap" style="min-height:calc(100vh - 4rem);">
    <!-- Imagen lateral -->
    <div class="pf-auth-image d-none d-md-block"s
         style="background-image:url('/images/auth-bg.jpg'); background-size:cover; background-position:center;">
        <div style="width:100%;height:100%;background:linear-gradient(to bottom,rgba(0,0,0,0.15),rgba(22,163,74,0.5));
                    display:flex;align-items:flex-end;padding:2.5rem;">
            <div class="text-white">
                <img src="imagenes/pawfeeder-mark.png" alt="PawFeeder" style="height:3rem;margin-bottom:1rem;filter:brightness(0) invert(1);" />
                <h2 class="fw-black mb-1"><span style="color:#bbf7d0;">Paw</span>Feeder</h2>
                <p class="opacity-75 mb-0">Alimentación inteligente para tu mascota.</p>
            </div>
        </div>
    </div>

    <!-- Formulario -->
    <div class="pf-auth-form">
        <div class="pf-form-box">
            <div class="text-center mb-5 d-md-none">
                <img src="imagenes/pawfeeder-mark.png" alt="PawFeeder" style="height:3.5rem;" class="mb-2" />
                <div class="pf-logo-text fs-3"><span class="paw">Paw</span><span class="feeder">Feeder</span></div>
            </div>

            <h2 class="fw-bold mb-1">Bienvenido de vuelta</h2>
            <p class="text-muted mb-4">Inicia sesión para gestionar a tu mascota.</p>

<form [formGroup].="loginForm" (ngSubmit)="onLogin()">

  <div class="mb-3">
    <label class="form-label">Correo electrónico</label>
    <input type="email" formControlName="email" class="form-control" placeholder="tu@correo.com">
  </div>

  <div class="mb-3">
    <label class="form-label">Contraseña</label>
    <input type="password" formControlName="password" class="form-control" placeholder="Mínimo 8 caracteres">
  </div>

  <button type="submit" class="btn btn-success w-100">Iniciar Sesión</button>
</form>

            <p class="text-center text-muted small">
                ¿No tienes cuenta?
                <a asp-controller="Account" asp-action="Register" class="text-decoration-none fw-semibold" style="color:var(--pf-primary);">Regístrate gratis</a>
            </p>
        </div>
    </div>
</div>
